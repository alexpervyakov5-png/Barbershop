name: tribe
description: Мобильное приложение для записи в барбершоп
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  go_router: ^14.0.0
  intl: 0.20.2
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0
  url_launcher: ^6.2.5
  table_calendar: ^3.0.9
  flutter_localizations:
    sdk: flutter
  connectivity_plus: ^5.0.2
  image_picker: ^1.0.7
  path: ^1.8.3
  cached_network_image: ^3.3.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0


flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/